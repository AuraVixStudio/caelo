name: CLA Assistant

# M15-1: wymusza podpisanie CLA (CLA.md) przy pierwszym zewnętrznym PR-ze.
# PR bez podpisu NIE przejdzie (status check „CLA Assistant" jest wymagany —
# ustaw branch protection na main, by go egzekwować).
#
# WYMAGANY SEKRET: dodaj `CLA_SIGNATURES_TOKEN` (PAT z zakresem `repo`) w
# Settings → Secrets → Actions. Bot zapisuje podpisy w pliku
# `.github/cla-signatures.json` na gałęzi `main`. Bez tego sekretu krok padnie.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write          # zapis pliku podpisów
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Reaguje na otwarcie/zmianę PR-a oraz na komentarz-podpis lub `recheck`.
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          # URL rozwiązuje się do faktycznego repo po publikacji (server_url/owner/repo).
          path-to-document: '${{ github.server_url }}/${{ github.repository }}/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],bot*,AuraVixStudio'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
