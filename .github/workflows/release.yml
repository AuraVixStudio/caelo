name: Release

# M15-9: budowa instalatorów per-OS na runnerze danego systemu (cross-compile
# sidecara PyInstaller jest niepraktyczny — każdy OS buduje swój własny sidecar).
# Wyzwalane TAGIEM `v*` (np. v1.2.0) lub ręcznie.
#
# ROAD-TOP2 / Faza B Krok 6.4: ten workflow BUDUJE artefakty, ale ich NIE PUBLIKUJE.
# Cert Caelo (Asseco SimplySign) jest chmurowy/nieeksportowalny → podpis działa wyłącznie
# LOKALNIE u usera (SimplySign Desktop), nie na runnerze GitHuba. Podpisane wydanie + feed
# `latest.yml` (auto-update, M15-8/electron-updater) tworzy user lokalnie
# (`npm run dist:full` + `electron-builder --publish always`, runbook Krok 6.4). Tutaj
# `--publish never` + upload-artifact, żeby CI NIE wypchnął niepodpisanego buildu na tag
# (kolizja z lokalnym wydaniem + serwowanie niepodpisanych binariów przez auto-update).
#
# Windows jest platformą główną; mac/Linux budują się „na żądanie" — fail-fast: false,
# więc brak certów/zależności na jednym OS nie blokuje pozostałych.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read           # CI tylko buduje/waliduje; podpisane wydania publikuje user lokalnie (Krok 6.4)

jobs:
  build:
    name: Build (UNSIGNED, ${{ matrix.os }} ${{ matrix.arch }})
    strategy:
      fail-fast: false
      # Każdy wpis = osobny runner danego OS/architektury. Sidecar PyInstaller jest
      # natywny dla architektury runnera (cross-compile niepraktyczny), więc x64/arm64
      # Maca budują się na ODDZIELNYCH runnerach: macos-13 (Intel/x64) + macos-14
      # (Apple Silicon/arm64). `ebuild` mówi electron-builderowi, którą platformę+arch
      # spakować (flagi CLI nadpisują arch z electron-builder.yml).
      # Windows NIE buduje się tutaj: podpis Authenticode używa certu CHMUROWEGO
      # SimplySign, który istnieje WYŁĄCZNIE lokalnie na maszynie utrzymującego
      # (SimplySign Desktop, karta wirtualna) — runner GitHuba go nie ma, więc
      # podpis padał. Podpisany .exe Windows powstaje lokalnie (`npm run dist:full`).
      # CI waliduje tylko cele cross-OS, których NIE da się zbudować lokalnie na Windows.
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            sidecar: bash build_sidecar.sh
            ebuild: --linux --x64
          - os: macos-13          # Intel
            arch: x64
            sidecar: bash build_sidecar.sh
            ebuild: --mac --x64
          - os: macos-14          # Apple Silicon
            arch: arm64
            sidecar: bash build_sidecar.sh
            ebuild: --mac --arm64
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      # Podpis + notaryzacja macOS (Developer ID). electron-builder czyta te zmienne
      # automatycznie: CSC_LINK/CSC_KEY_PASSWORD = cert .p12 (base64), APPLE_* = notaryzacja.
      # Gdy sekrety NIE są ustawione, renderują się jako pusty string → electron-builder
      # POMIJA podpis i buduje NIEPODPISANY .dmg (build pozostaje zielony). Notaryzacja
      # uruchamia się dopiero, gdy aplikacja została podpisana. Na Linuksie ignorowane.
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build sidecar (PyInstaller, per-OS)
        run: ${{ matrix.sidecar }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      # electron-updater jest zależnością runtime auto-update (M15-8) — domyślnie nie ma
      # jej jeszcze w package.json (patrz M15-8), więc dociągamy ją do builda.
      - name: Ensure electron-updater present
        working-directory: desktop
        run: npm ls electron-updater || npm install electron-updater

      # electron-builder pakuje GOTOWY build (out/main, out/preload, out/renderer);
      # bez tego kroku `out/main/index.js` nie istnieje i pakowanie pada
      # ("Application entry file ... does not exist"). Skrypty dist:* w package.json
      # robią to przez `npm run build &&`, ale tu wołamy binarkę wprost — więc budujemy jawnie.
      - name: Build frontend (electron-vite)
        working-directory: desktop
        run: npm run build

      # ROAD-TOP2 / Krok 6.4: `--publish never` — CI NIE może podpisać (cert chmurowy
      # SimplySign jest lokalny), więc nie publikujemy. Build waliduje pakowanie cross-OS.
      # `matrix.ebuild` = platforma+arch (np. `--mac --arm64`); flagi CLI nadpisują arch z konfiga.
      - name: Build installer (UNSIGNED — validation only, never published)
        working-directory: desktop
        run: npx --no-install electron-builder ${{ matrix.ebuild }} --publish never

      # Artefakty do wglądu/diagnostyki builda (NIE są wydaniem). Pełne, PODPISANE wydanie
      # Windows publikuje user lokalnie (SimplySign Desktop aktywny) — runbook Krok 6.4.
      - name: Upload unsigned build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: caelo-unsigned-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: ignore
          retention-days: 7
