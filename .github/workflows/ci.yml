name: CI

# P3-1: ciągła integracja — uruchamia backendowe self-checki (3 z 4 skryptów;
# sidecar_smoke.py wymaga spakowanego .exe z PyInstallera, więc biegnie dopiero
# po `npm run pack:sidecar` na maszynie wydającej, nie tutaj) oraz typecheck frontu.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Anuluj starsze biegi tej samej gałęzi/PR-a, gdy nadejdzie nowy commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    # Aplikacja jest Windows-only (cmd.exe, pywinpty, tree-kill `taskkill`), a
    # self-checki spawnują sidecar i weryfikują zachowania zależne od platformy —
    # więc CI backendu biegnie na Windows, tak jak środowisko docelowe.
    name: Backend self-checks (Windows)
    runs-on: windows-latest
    env:
      # stdout/stderr jako UTF-8 — testy operują na polskich znakach (anty-mojibake).
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: grok_core/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r grok_core/requirements.txt

      # Każdy skrypt to samodzielny zestaw asercji (kod wyjścia != 0 => fail).
      # Uruchamiane z korzenia repo (sidecar startowany jako `python -m grok_core`).
      - name: Handshake + /health + token auth
        run: python grok_core/tools/handshake_check.py

      - name: REST + WS routes + token/CORS + unit logic (api_smoke)
        run: python grok_core/tools/api_smoke.py

      - name: Agent tools + loop + sandbox (agent_selfcheck)
        run: python grok_core/tools/agent_selfcheck.py

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    env:
      # Typecheck nie potrzebuje binarki Electrona — pomijamy jej pobieranie
      # (szybciej, bez flaky-sieci).
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck (tsc — node + web)
        run: npm run typecheck
