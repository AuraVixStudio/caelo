name: CI

# Ciągła integracja — każdy PR przechodzi te same bramki co utrzymujący:
#   • secrets   — skan sekretów na CAŁEJ historii (gitleaks, M15-2),
#   • backend   — wszystkie self-checki Pythona (M15-3; sidecar_smoke wymaga
#                 spakowanego .exe, więc biegnie dopiero przy wydaniu, nie tutaj),
#   • frontend  — typecheck + ESLint + Vitest (M15-3).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Anuluj starsze biegi tej samej gałęzi/PR-a, gdy nadejdzie nowy commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    # M15-2: ostatnia bariera przed commitem klucza xAI / tokenu OAuth (BYO-key).
    # Skanuje pełną historię (fetch-depth: 0); konfiguracja w .gitleaks.toml.
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # pełna historia dla `gitleaks detect`
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE jest wymagany tylko dla repozytoriów ORGANIZACJI;
          # dla repo osobistego / publicznego skan jest darmowy.

  backend:
    # P3-12: self-checki backendu biegną na MATRYCY 3 OS. Kod ma świadome rozgałęzienia
    # per-OS (shell=False+shlex na POSIX vs cmd.exe `shell=True`, killpg vs taskkill,
    # ścieżki DATA_DIR, skaner metaznaków P0-10) — crossplatform_check.py bada je wprost,
    # więc walidujemy je na KAŻDYM PR, a nie dopiero przy wydaniu (release.yml). pywinpty
    # instaluje się tylko na Windows (marker w requirements.txt); pozostałe checki nie
    # wymagają PTY. fail-fast: false → awaria jednego OS nie maskuje pozostałych.
    name: Backend self-checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      # stdout/stderr jako UTF-8 — testy operują na polskich znakach (anty-mojibake).
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: caelo_core/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r caelo_core/requirements.txt

      # P3-13: self-checki biegną przez pytest (discovery + jeden bieg). Każda suita
      # (tools/*_check.py, api_smoke, handshake_check) to osobny test parametryczny —
      # jej main() zwraca 0 (OK) / 1 (FAIL); uruchamiane z korzenia repo (sidecar startuje
      # jako `python -m caelo_core`). sidecar_smoke pominięty — wymaga spakowanego .exe (release).
      - name: Install dev/test deps (pytest)
        run: pip install -r caelo_core/requirements-dev.txt

      - name: Self-checks via pytest (handshake/api_smoke/agent/crossplatform/mcp/genjobs/history/packages)
        run: python -m pytest caelo_core/tests -v

  frontend:
    name: Frontend typecheck + lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    env:
      # Typecheck/lint/test nie potrzebują binarki Electrona — pomijamy jej pobieranie.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck (tsc — node + web)
        run: npm run typecheck

      # P3-10: eslint/typescript-eslint/eslint-plugin-react-hooks/globals/vitest są teraz
      # w devDependencies (package.json) i w package-lock.json, więc `npm ci` powyżej je
      # instaluje — efemeryczny `npm install --no-save` został usunięty.
      - name: Lint (ESLint — react-hooks)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    # P3-11: testy E2E (Playwright) nad `preview:web` (Vite + atrapa window.caelo z
    # lib/devMock) — renderer BEZ Electrona/sidecara. Walidują powłokę: ładowanie/
    # "Connected", nawigację po rail (aria-current), paletę Ctrl-K. Osobny job: pobiera
    # binaria przeglądarki (CI ma sieć — dociąga build pasujący do @playwright/test).
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright on preview:web + devMock)
        run: npm run test:e2e
