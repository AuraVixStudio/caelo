# Pre-commit hooks (M15-2). Instalacja (jednorazowo, na maszynie z siecią):
#     pip install pre-commit
#     pre-commit install            # podpina hook do .git/hooks/pre-commit
# Ręczne uruchomienie na całym repo:
#     pre-commit run --all-files
#
# Główny cel: SKANER SEKRETÓW (gitleaks) blokujący commit z kluczem/tokenem.
# Caelo jest BYO-key — to ostatnia bariera przed przypadkowym wyciekiem.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key       # dodatkowa siatka na klucze prywatne
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.(md|lock)$|package-lock\.json$'
      - id: check-added-large-files
        args: ['--maxkb=2048']
